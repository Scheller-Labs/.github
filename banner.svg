<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#3D2B1F" stroke-width="0.4" opacity="0.12"/>
    </pattern>
    <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="0.8" fill="#3D2B1F" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Parchment background -->
  <rect width="1200" height="260" fill="#F4EBD0"/>
  <!-- Grid overlay -->
  <rect width="1200" height="260" fill="url(#grid)"/>
  <!-- Dot grid overlay -->
  <rect width="1200" height="260" fill="url(#dots)"/>

  <!-- Outer frame lines -->
  <line x1="40" y1="20" x2="1160" y2="20" stroke="#3D2B1F" stroke-width="0.5" opacity="0.25"/>
  <line x1="40" y1="240" x2="1160" y2="240" stroke="#3D2B1F" stroke-width="0.5" opacity="0.25"/>
  <line x1="40" y1="20" x2="40" y2="240" stroke="#3D2B1F" stroke-width="0.5" opacity="0.15"/>
  <line x1="1160" y1="20" x2="1160" y2="240" stroke="#3D2B1F" stroke-width="0.5" opacity="0.15"/>

  <!-- Protocol Cyan accent bar at bottom -->
  <rect x="40" y="237" width="1120" height="2" fill="#0095A2" opacity="0.85"/>

  <!-- Corner brackets — top left -->
  <path d="M 40 50 L 40 20 L 70 20" fill="none" stroke="#3D2B1F" stroke-width="1.2" opacity="0.4"/>
  <!-- Corner brackets — top right -->
  <path d="M 1130 20 L 1160 20 L 1160 50" fill="none" stroke="#3D2B1F" stroke-width="1.2" opacity="0.4"/>
  <!-- Corner brackets — bottom left -->
  <path d="M 40 210 L 40 240 L 70 240" fill="none" stroke="#3D2B1F" stroke-width="1.2" opacity="0.4"/>
  <!-- Corner brackets — bottom right -->
  <path d="M 1130 240 L 1160 240 L 1160 210" fill="none" stroke="#3D2B1F" stroke-width="1.2" opacity="0.4"/>

  <!-- S_LABS chip -->
  <rect x="64" y="34" width="82" height="20" fill="#2D2926"/>
  <text x="105" y="48.5" font-family="'Courier New', Courier, monospace" font-size="10" font-weight="700" fill="#0095A2" text-anchor="middle" letter-spacing="1.8">S_LABS</text>

  <!-- Epoch label -->
  <text x="155" y="48.5" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#3D2B1F" opacity="0.45" letter-spacing="1.2">// ANNO_MMXXVI — THE NEW ENLIGHTENMENT</text>

  <!-- Vertical rule before marginalia -->
  <line x1="880" y1="34" x2="880" y2="226" stroke="#3D2B1F" stroke-width="0.5" opacity="0.12"/>

  <!-- Main wordmark -->
  <text x="64" y="148" font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif" font-size="78" font-weight="700" fill="#2D2926" letter-spacing="-2">Scheller Labs</text>

  <!-- Italic tagline -->
  <text x="67" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-style="italic" fill="#3D2B1F" opacity="0.68">The Codex of Modern Intelligence</text>

  <!-- Cyan sub-rule under tagline -->
  <rect x="67" y="192" width="280" height="1.5" fill="#0095A2" opacity="0.7"/>

  <!-- Bottom descriptor -->
  <text x="67" y="218" font-family="'Courier New', Courier, monospace" font-size="10.5" fill="#3D2B1F" opacity="0.45" letter-spacing="1.5">BRIDGING RENAISSANCE RIGOR AND AGENTIC AI FRONTIERS</text>

  <!-- Right marginalia column -->
  <text x="1136" y="64" font-family="'Courier New', Courier, monospace" font-size="9" fill="#3D2B1F" opacity="0.35" text-anchor="end">AGENT_STATUS: ACTIVE</text>
  <text x="1136" y="80" font-family="'Courier New', Courier, monospace" font-size="9" fill="#0095A2" text-anchor="end" opacity="0.65">SYSTEM_HEARTBEAT: STABLE</text>
  <text x="1136" y="96" font-family="'Courier New', Courier, monospace" font-size="9" fill="#3D2B1F" opacity="0.35" text-anchor="end">SECTOR_07 // LATENCY: 14MS</text>

  <!-- Crosshair target right side -->
  <circle cx="1040" cy="155" r="28" fill="none" stroke="#0095A2" stroke-width="0.6" opacity="0.25"/>
  <circle cx="1040" cy="155" r="8" fill="none" stroke="#0095A2" stroke-width="0.6" opacity="0.25"/>
  <line x1="1005" y1="155" x2="1075" y2="155" stroke="#0095A2" stroke-width="0.6" opacity="0.25"/>
  <line x1="1040" y1="120" x2="1040" y2="190" stroke="#0095A2" stroke-width="0.6" opacity="0.25"/>
  <circle cx="1040" cy="155" r="2" fill="#0095A2" opacity="0.45"/>

  <!-- Small annotation tick marks right side -->
  <line x1="895" y1="120" x2="905" y2="120" stroke="#3D2B1F" stroke-width="0.5" opacity="0.25"/>
  <line x1="895" y1="145" x2="905" y2="145" stroke="#3D2B1F" stroke-width="0.5" opacity="0.25"/>
  <line x1="895" y1="170" x2="905" y2="170" stroke="#3D2B1F" stroke-width="0.5" opacity="0.25"/>
  <line x1="895" y1="195" x2="910" y2="195" stroke="#0095A2" stroke-width="0.8" opacity="0.4"/>
  <text x="918" y="198" font-family="'Courier New', Courier, monospace" font-size="8" fill="#0095A2" opacity="0.5">PRIMARY_AXIS</text>

  <!-- Scientific Gold annotation dots -->
  <circle cx="895" cy="120" r="1.5" fill="#D4AF37" opacity="0.5"/>
  <circle cx="895" cy="145" r="1.5" fill="#D4AF37" opacity="0.5"/>
  <circle cx="895" cy="170" r="1.5" fill="#D4AF37" opacity="0.5"/>
  <circle cx="895" cy="195" r="2" fill="#0095A2" opacity="0.6"/>
</svg>
